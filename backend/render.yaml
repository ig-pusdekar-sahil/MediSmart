services:
  - type: web
    name: medismart-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You will set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your frontend URL e.g. https://your-app.vercel.app
